name: Express CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Code Quality (Linter)
        run: npm run lint

      - name: Security Check (Dependency Audit)
        run: npm run audit

      - name: Run Tests
        run: npm test

      - name: Pipeline Status
        run: echo "CI Pipeline checks completed successfully!"
