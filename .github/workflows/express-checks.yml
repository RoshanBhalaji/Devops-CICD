name: Express CI Pipeline

env:
  APP_ENV: dev
  PORT: 3000
  DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Code Quality (Linter)
        run: npm run lint

      - name: Security Check (Dependency Audit)
        run: npm run audit

      - name: Run Tests
        run: npm test

      - name: Generate Sample Report
        run: |
          echo "Status: SUCCESS" > build-report.txt
          echo "Timestamp: $(date)" >> build-report.txt
          echo "Environment: ${{ env.APP_ENV }}" >> build-report.txt

      - name: Upload Sample Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-build-report
          path: build-report.txt

      - name: Pipeline Status
        run: |
          echo "CI Pipeline checks completed successfully!"
          echo "Running in environment: ${{ env.APP_ENV }}"
          echo "Configured Port: ${{ env.PORT }}"
          echo "Database Password: ${{ env.DATABASE_PASSWORD }}"
